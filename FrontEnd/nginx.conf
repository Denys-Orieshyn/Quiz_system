server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Усі API-запити залишаються на тому самому домені фронтенду,
    # а Nginx передає їх backend-сервісу у docker-compose мережі.
    # Проксі всіх /api/* запитів на бекенд
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
